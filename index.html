  if(btn) btn.classList.toggle('visible', watchedSls.size > 0);
}

// ── SAVED VIEWS ───────────────────────────────────────────────────────────────
const VIEWS_KEY = 'sppLmpViews_v1';
let activeViewName = null;

function captureViewState(){
  return {
    slFilter:    [...colFilters.sl],
    lmpFilter:   colFilters.lmp,
    mccFilter:   colFilters.mcc,
    watched:     [...watchedSls],
    sortCol:     sortCol,
    sortDir:     sortDir,
    zone:        document.getElementById('zoneSel')?.value || 'all',
    filt:        document.getElementById('filt')?.value || 'all',
    search:      document.getElementById('search')?.value || '',
  };
}

function applyViewState(state){
  // Restore filters
  colFilters.sl  = new Set(state.slFilter || []);
  colFilters.lmp = state.lmpFilter || '';
  colFilters.mcc = state.mccFilter || '';
  // Restore watched
  watchedSls = new Set(state.watched || []);
  // Restore sort
  sortCol = state.sortCol || 'lmp_d';
  sortDir = state.sortDir || 1;
  // Restore dropdowns/search
  const zs = document.getElementById('zoneSel');
  const fs = document.getElementById('filt');
  const ss = document.getElementById('search');
  if(zs) zs.value = state.zone || 'all';
  if(fs) fs.value = state.filt || 'all';
  if(ss) ss.value = state.search || '';
  // Re-render everything
  ['sl','lmp','mcc'].forEach(c => updateFilterBtn(c));
  updateWatchPanel();
  const expBtn = document.getElementById('exportSelectedBtn');
  if(expBtn) expBtn.classList.toggle('visible', watchedSls.size > 0);
  renderTable();
}

function loadViews(){
  try { return JSON.parse(localStorage.getItem(VIEWS_KEY) || '[]'); }
  catch(e){ return []; }
}

function saveViews(views){
  localStorage.setItem(VIEWS_KEY, JSON.stringify(views));
}

function toggleViewsPanel(){
  const panel = document.getElementById('viewsPanel');
  if(!panel) return;
  const open = panel.style.display !== 'none';
  panel.style.display = open ? 'none' : 'block';
  if(!open) renderViewsList();
}

function renderViewsList(){
  const el = document.getElementById('viewsList');
  if(!el) return;
  const views = loadViews();
  el.innerHTML = '';

  // Default view card
  const defCard = makeViewCard('Default', null, true);
  el.appendChild(defCard);

  views.forEach((v, idx) => {
    el.appendChild(makeViewCard(v.name, idx, false));
  });

  // Dirty indicator
  updateDirtyIndicator();
}

function makeViewCard(name, idx, isDefault){
  const card = document.createElement('div');
  card.className = 'view-card' + (isDefault ? ' default-view' : '') +
    (activeViewName === name ? ' active-view' : '');

  const info = document.createElement('div');
  const nameEl = document.createElement('div');
  nameEl.className = 'view-card-name';
  nameEl.textContent = isDefault ? '⊘ Default (clear all)' : name;

  const meta = document.createElement('div');
  meta.className = 'view-card-meta';
  if(!isDefault){
    const views = loadViews();
    const v = views[idx];
    const parts = [];
    if(v.slFilter?.length) parts.push((v.slFilter.length === 1 ? v.slFilter[0] : v.slFilter.length + ' locations'));
    if(v.watched?.length) parts.push('★ ' + v.watched.length + ' watched');
    if(v.lmpFilter) parts.push('LMP: ' + (filterLabel('lmp', v.lmpFilter)));
    if(v.mccFilter) parts.push('MCC: ' + (filterLabel('mcc', v.mccFilter)));
    meta.textContent = parts.length ? parts.join(' · ') : 'No filters';
    if(v.savedAt) meta.textContent += '  ·  ' + new Date(v.savedAt).toLocaleDateString();
  } else {
    meta.textContent = 'Resets all filters & watched';
  }

  info.appendChild(nameEl);
  info.appendChild(meta);
  card.appendChild(info);

  // Load button behavior on card click
  card.addEventListener('click', (e) => {
    if(e.target.classList.contains('view-card-del')) return;
    if(isDefault){
      loadDefaultView();
    } else {
      loadSavedView(idx);
    }
  });

  // Delete button (not on default)
  if(!isDefault){
    const del = document.createElement('button');
    del.className = 'view-card-del';
    del.title = 'Delete view';
    del.textContent = '✕';
    del.addEventListener('click', (e) => {
      e.stopPropagation();
      deleteSavedView(idx);
    });
    card.appendChild(del);
  }

  return card;
}

function loadDefaultView(){
  colFilters.sl  = new Set();
  colFilters.lmp = '';
  colFilters.mcc = '';
  watchedSls     = new Set();
  sortCol = 'lmp_d'; sortDir = 1;
  const zs = document.getElementById('zoneSel');
  const fs = document.getElementById('filt');
  const ss = document.getElementById('search');
  if(zs) zs.value = 'all';
  if(fs) fs.value = 'all';
  if(ss) ss.value = '';
  ['sl','lmp','mcc'].forEach(c => updateFilterBtn(c));
  updateWatchPanel();
  const expBtn = document.getElementById('exportSelectedBtn');
  if(expBtn) expBtn.classList.remove('visible');
  renderTable();
  activeViewName = 'Default';
  renderViewsList();
}

function loadSavedView(idx){
  const views = loadViews();
  if(!views[idx]) return;
  applyViewState(views[idx].state);
  activeViewName = views[idx].name;
  renderViewsList();
}

function saveCurrentView(){
  const input = document.getElementById('viewsNameInput');
  const name = (input?.value || '').trim();
  if(!name){ input?.focus(); return; }

  const views = loadViews();
  // Overwrite if same name exists
  const existIdx = views.findIndex(v => v.name.toLowerCase() === name.toLowerCase());
  const entry = { name, state: captureViewState(), savedAt: Date.now() };
  if(existIdx >= 0) views[existIdx] = entry;
  else views.push(entry);

  saveViews(views);
  activeViewName = name;
  if(input) input.value = '';
  renderViewsList();
}

function deleteSavedView(idx){
  const views = loadViews();
  const dying = views[idx]?.name;
  views.splice(idx, 1);
  saveViews(views);
  if(activeViewName === dying) activeViewName = null;
  renderViewsList();
}

function updateDirtyIndicator(){
  const el = document.getElementById('viewsDirty');
  if(!el || !activeViewName || activeViewName === 'Default') { if(el) el.textContent = ''; return; }
  const views = loadViews();
  const saved = views.find(v => v.name === activeViewName);
  if(!saved){ el.textContent = ''; return; }
  // Simple dirty check: compare JSON of key fields
  const current = captureViewState();
  const isDirty = JSON.stringify(current) !== JSON.stringify(saved.state);
  el.textContent = isDirty ? '● unsaved changes' : '✓ ' + activeViewName;
}

function clearWatched(){
  watchedSls.clear();
  updateWatchPanel();
  renderTable();
  const btn = document.getElementById('exportSelectedBtn');
  if(btn) btn.classList.remove('visible');
}

function updateWatchPanel(){
  const panel = document.getElementById('watchPanel');
  const rowsEl = document.getElementById('watchRows');
  if(!panel || !rowsEl) return;

  if(watchedSls.size === 0){
    panel.classList.remove('visible');
    return;
  }
  panel.classList.add('visible');

  // Update compare button state
  const cmpBtn = document.getElementById('compareBtn');
  if(cmpBtn) cmpBtn.style.opacity = watchedSls.size >= 2 ? '1' : '0.4';

  rowsEl.innerHTML = [...watchedSls].map(sl => {
    const row = rtbmData.find(r => r.sl === sl);
    const lmp = row ? row.lmp : null;
    const daLmp = (daStore[sl]) ? (() => {
      const hr = rtbmData[0] ? getHourEndingKey(rtbmData[0].interval) : null;
      return hr ? daStore[sl][hr] : null;
    })() : null;
    const spread = (lmp !== null && daLmp !== null) ? lmp - daLmp : null;
    const spreadFiring = spreadAlertThreshold !== null && spread !== null && Math.abs(spread) >= spreadAlertThreshold;

    return '<div class="watch-card">' +
      '<button class="watch-card-remove" onclick="toggleWatch(\''+escH(sl)+'\',event)" title="Remove">✕</button>' +
      '<div class="watch-card-name" title="'+escH(sl)+'">'+escH(sl)+'</div>' +
      (lmp !== null
        ? '<div class="watch-card-lmp" style="color:'+lmpColor(lmp)+'">$'+lmp.toFixed(2)+'</div>'
        : '<div class="watch-card-lmp" style="color:var(--muted)">—</div>') +
      (spread !== null
        ? '<div class="watch-card-spread">RT−DA: <span style="color:'+lmpColor(spread)+'">'+(spread>=0?'+':'')+'$'+spread.toFixed(2)+'</span></div>'
        : '<div class="watch-card-spread" style="color:var(--muted)">RT−DA: load DA</div>') +
      '<div class="watch-card-alert'+(spreadFiring?' firing':'')+'">⚡ Spread alert!</div>' +
    '</div>';
  }).join('');
}

function saveSpreadAlert(){
  const v = parseFloat(document.getElementById('spreadAlertInput').value);
  spreadAlertThreshold = isNaN(v) ? null : Math.abs(v);
  const el = document.getElementById('spreadAlertStatus');
  if(el) el.textContent = spreadAlertThreshold !== null ? 'Alert: |spread| ≥ $'+spreadAlertThreshold : 'No spread alert set.';
}

function clearSpreadAlert(){
  spreadAlertThreshold = null;
  const inp = document.getElementById('spreadAlertInput');
  if(inp) inp.value = '';
  const el = document.getElementById('spreadAlertStatus');
  if(el) el.textContent = 'Cleared.';
}

function checkSpreadAlerts(){
  if(spreadAlertThreshold === null || watchedSls.size === 0) return;
  const msgs = [];
  watchedSls.forEach(sl => {
    const row = rtbmData.find(r => r.sl === sl);
    if(!row) return;
    const hr = getHourEndingKey(row.interval);
    const daLmp = daStore[sl] && hr ? daStore[sl][hr] : null;
    if(daLmp === null) return;
    const spread = row.lmp - daLmp;
    if(Math.abs(spread) >= spreadAlertThreshold){
      msgs.push('⚡ '+sl+' RT−DA spread = '+(spread>=0?'+':'')+'$'+spread.toFixed(2));
    }
  });
  if(msgs.length){
    document.getElementById('alertBannerText').textContent = msgs.join('  |  ');
    document.getElementById('alertBanner').classList.add('visible');
    playChime();
  }
}

        borderWidth: 2, pointRadius: 2, pointHoverRadius: 5, tension: 0.3, fill: false, spanGaps: true },
      { label: sl+' RT', data: rtDots, borderColor: col, backgroundColor: col,
        borderWidth: 0, pointRadius: rtDots.map(v=>v!==null?5:0), pointHoverRadius: 7,
        showLine: false, pointStyle: 'circle' }
    ];
  }).flat();

  // Legend
  document.getElementById('compareLegend').innerHTML = sls.map((sl,i) =>
    '<span><span class="legend-dot" style="background:'+COMPARE_COLORS[i % COMPARE_COLORS.length]+'"></span>'+escH(sl)+'</span>'
  ).join('');

  // Chart
  if(compareChartInst){ compareChartInst.destroy(); compareChartInst=null; }
  const ctx = document.getElementById('compareChart').getContext('2d');
  compareChartInst = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode:'index', intersect:false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor:'#161920', borderColor:'#252b38', borderWidth:1,
          titleColor:'#7a8499', bodyColor:'#dde3ed',
          titleFont:{family:'IBM Plex Mono',size:11}, bodyFont:{family:'IBM Plex Mono',size:11},
          filter: item => item.raw !== null,
          callbacks: { label: ctx => ctx.raw!==null ? ctx.dataset.label+': $'+ctx.raw.toFixed(2) : null }
        }
      },
      scales: {
        x: { ticks:{color:'#7a8499',font:{family:'IBM Plex Mono',size:10}}, grid:{color:'#252b38'} },
        y: { ticks:{color:'#7a8499',font:{family:'IBM Plex Mono',size:10},callback:v=>'$'+v}, grid:{color:'#252b38'} }
      }
    }
  });

  document.getElementById('compareOverlay').classList.remove('hidden');
}

function closeCompareModal(){
  document.getElementById('compareOverlay').classList.add('hidden');
  if(compareChartInst){ compareChartInst.destroy(); compareChartInst=null; }
}

// ── EXPORT SELECTED ───────────────────────────────────────────────────────────
function downloadSelectedCSV(){
  if(!watchedSls.size){ return; }
  const rows = rtbmData.filter(r => watchedSls.has(r.sl));
  const hdr = 'Interval,SettlementLocation,Pnode,LMP,MCC,MEC,MLC';
  const lines = rows.map(r => [r.interval,r.sl,r.pnode,r.lmp,r.mcc,r.mec,r.mlc].join(','));
  const blob = new Blob([hdr+'\n'+lines.join('\n')], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'SPP_LMP_Selected_'+new Date().toISOString().slice(0,16).replace(':','-')+'.csv';
  a.click();
}

// On load: show upload UI immediately instead of triggering failed proxies
showUploadUI();
</script>
