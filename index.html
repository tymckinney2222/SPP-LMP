<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPP LMP Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0f14;--surface:#161920;--surface2:#1c2028;--border:#252b38;
    --accent:#00d4ff;--orange:#ff7043;--green:#69f0ae;
    --text:#dde3ed;--muted:#7a8499;--positive:#69f0ae;--negative:#ff5252;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:15px;min-height:100vh;overflow-x:hidden}

  header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(13,15,20,.98);backdrop-filter:blur(10px);z-index:50}
  .logo{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:1.1rem;letter-spacing:.06em;color:var(--accent)}
  .logo span{color:var(--text);opacity:.7}
  .status-pill{display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--muted);font-family:'IBM Plex Mono',monospace;letter-spacing:.06em}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--muted);flex-shrink:0}
  .dot.live{background:var(--positive);animation:pulse 2s infinite}
  .dot.loading{background:var(--accent);animation:blink .7s infinite}
  .dot.error{background:var(--negative)}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(105,240,174,.5)}70%{box-shadow:0 0 0 7px rgba(105,240,174,0)}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
  @keyframes spin{to{transform:rotate(360deg)}}

  main{padding:20px}

  /* Tabs */
  .tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:20px;gap:4px}
  .tab{font-family:'IBM Plex Mono',monospace;font-size:.8rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:10px 18px;cursor:pointer;color:var(--muted);border:none;border-bottom:3px solid transparent;margin-bottom:-2px;background:none;transition:all .15s;border-radius:4px 4px 0 0}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(0,212,255,.05)}
  .tab:hover:not(.active){color:var(--text);background:rgba(255,255,255,.03)}

  /* Buttons */
  .controls{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
  .btn{font-family:'IBM Plex Mono',monospace;font-size:.8rem;font-weight:600;padding:10px 18px;border-radius:6px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;letter-spacing:.04em;transition:all .15s;white-space:nowrap}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn.primary{background:var(--accent);color:#0d0f14;border-color:var(--accent)}
  .btn.primary:hover{background:#00bde8}
  .btn:disabled{opacity:.35;cursor:not-allowed}
  .btn.auto-on{border-color:var(--positive);color:var(--positive)}

  /* Filters */
  .filter-row{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
  input[type=text]{font-family:'IBM Plex Sans',sans-serif;font-size:.88rem;padding:9px 14px;background:var(--surface);border:1.5px solid var(--border);color:var(--text);border-radius:6px;width:260px;outline:none;transition:border-color .15s}
  input[type=text]:focus{border-color:var(--accent)}
  input[type=text]::placeholder{color:var(--muted)}
  select{font-family:'IBM Plex Sans',sans-serif;font-size:.85rem;padding:9px 13px;background:var(--surface);border:1.5px solid var(--border);color:var(--text);border-radius:6px;outline:none;cursor:pointer}
  .row-count{font-size:.82rem;color:var(--muted);margin-left:auto;font-family:'IBM Plex Mono',monospace}

  /* Stat cards */
  .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
  .stat-card{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:14px 16px;position:relative;overflow:hidden}
  .stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);border-radius:8px 8px 0 0}
  .stat-card.warn::after{background:var(--orange)}
  .stat-card.good::after{background:var(--green)}
  .stat-label{font-size:.72rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px;font-family:'IBM Plex Mono',monospace}
  .stat-value{font-size:1.6rem;font-weight:700;color:var(--accent);line-height:1;font-family:'IBM Plex Mono',monospace}
  .stat-card.warn .stat-value{color:var(--orange)}
  .stat-card.good .stat-value{color:var(--green)}
  .stat-sub{font-size:.75rem;color:var(--muted);margin-top:5px}

  /* Timestamp */
  .ts{font-size:.8rem;color:var(--muted);margin-bottom:14px;font-family:'IBM Plex Mono',monospace;line-height:1.6}
  .badge{display:inline-block;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.25);color:var(--accent);font-size:.72rem;padding:3px 9px;border-radius:20px;font-family:'IBM Plex Mono',monospace;font-weight:600}

  /* Table */
  .table-wrap{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;overflow:auto;max-height:520px}
  table{width:100%;border-collapse:collapse}
  thead{position:sticky;top:0;background:#10131a;z-index:10}
  th{padding:11px 14px;text-align:left;font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border-bottom:1.5px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;font-family:'IBM Plex Mono',monospace}
  th:hover{color:var(--accent)}
  td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:.88rem;white-space:nowrap}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:rgba(0,212,255,.03)}
  .lp{font-weight:700;font-family:'IBM Plex Mono',monospace;font-size:.92rem}
  .c-pos{color:var(--orange)}.c-neg{color:var(--accent)}.c-high{color:var(--negative)}.c-zero{color:var(--muted)}
  .comp{color:var(--muted);font-size:.82rem;font-family:'IBM Plex Mono',monospace}
  .pnode-cell{color:var(--muted);font-size:.78rem;font-family:'IBM Plex Mono',monospace;max-width:200px;overflow:hidden;text-overflow:ellipsis}
  .sl-cell{font-weight:600;font-size:.88rem}

  /* Loading */
  .loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:260px;gap:14px;color:var(--muted);font-size:.88rem;letter-spacing:.05em;font-family:'IBM Plex Mono',monospace}
  .spinner{width:34px;height:34px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  .proxy-label{font-size:.75rem;color:var(--muted);text-align:center}
  .proxy-label em{color:var(--accent);font-style:normal}
  .pip-row{display:flex;gap:7px;margin-top:4px}
  .pip{width:9px;height:9px;border-radius:50%;background:var(--border);transition:background .3s}
  .pip.trying{background:var(--accent);animation:blink .6s infinite}
  .pip.ok{background:var(--positive)}
  .pip.fail{background:var(--negative)}

  /* Upload zone */
  .upload-zone{margin-top:0;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:20px}
  .upload-zone h2{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:6px}
  .upload-zone p{font-size:.85rem;color:var(--muted);line-height:1.7;margin-bottom:14px}
  .upload-zone .step{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;font-size:.85rem;color:var(--muted);line-height:1.6}
  .step-num{background:rgba(0,212,255,.12);color:var(--accent);font-weight:700;font-size:.75rem;padding:2px 8px;border-radius:4px;flex-shrink:0;font-family:'IBM Plex Mono',monospace;margin-top:1px}
  .step code{font-family:'IBM Plex Mono',monospace;font-size:.78rem;color:var(--accent);background:rgba(0,212,255,.07);padding:1px 6px;border-radius:3px;word-break:break-all}
  .dropbox{border:2px dashed var(--border);border-radius:8px;padding:28px 20px;text-align:center;color:var(--muted);font-size:.88rem;transition:border-color .2s,background .2s;margin-top:16px}
  .dropbox:hover{border-color:var(--accent);background:rgba(0,212,255,.03)}
  .dropbox .drop-icon{font-size:2rem;margin-bottom:10px}
  .dropbox .drop-text{margin-bottom:14px;line-height:1.5}
  .dropbox .drop-text strong{color:var(--text)}
</style>
</head>
<body>
<header>
  <div class="logo">SPP<span> // LMP</span></div>
  <div class="status-pill"><div class="dot" id="dot"></div><span id="stxt">READY</span></div>
</header>
<main>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('rtbm',this)">RTBM Real-Time</button>
    <button class="tab" onclick="switchTab('da',this)">Day-Ahead</button>
    <button class="tab" onclick="switchTab('hub',this)">Hub &amp; Interface</button>
  </div>
  <div class="controls">
    <button class="btn primary" id="fetchBtn" onclick="fetchData()">⟳ Fetch Latest</button>
    <button class="btn" id="autoBtn" onclick="toggleAuto()">Auto-Refresh: Off</button>
    <button class="btn" onclick="downloadCSV()" style="margin-left:auto">↓ Export CSV</button>
  </div>
  <div class="filter-row" id="filterRow" style="display:none">
    <input type="text" id="search" placeholder="Search settlement location or pnode…" oninput="renderTable()">
    <select id="sortSel" onchange="renderTable()">
      <option value="lmp_d">LMP: High → Low</option>
      <option value="lmp_a">LMP: Low → High</option>
      <option value="name">Name A → Z</option>
      <option value="mec">MEC ↓</option>
      <option value="mcc">MCC ↓</option>
    </select>
    <select id="filt" onchange="renderTable()">
      <option value="all">All Prices</option>
      <option value="high">High (&gt;$50)</option>
      <option value="neg">Negative</option>
      <option value="low">Low (&lt;$20)</option>
    </select>
    <span class="row-count" id="rowCount"></span>
  </div>
  <div id="statsRow" class="stats-row"></div>
  <div id="ts" class="ts"></div>
  <div id="content"></div>
</main>

<script>
let allData=[], tab='rtbm', autoTimer=null, autoOn=false;
const BASE='https://portal.spp.org/file-browser-api/download';

const PROXIES=[
  u=>`https://corsproxy.io/?url=${encodeURIComponent(u)}`,
  u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
  u=>`https://thingproxy.freeboard.io/fetch/${u}`,
];
const PROXY_NAMES=['corsproxy.io','allorigins.win','codetabs.com','thingproxy'];

function fetchWithTimeout(url,ms){
  return new Promise((res,rej)=>{
    const t=setTimeout(()=>rej(new Error('timeout')),ms);
    fetch(url,{cache:'no-store'}).then(r=>{clearTimeout(t);res(r);}).catch(e=>{clearTimeout(t);rej(e);});
  });

}

// Track which proxy succeeded last time — start with a different one next fetch
let lastGoodProxy = 0;

async function proxyFetch(targetUrl){
  // Rotate starting proxy each call so we never reuse the same cached response
  const ts = Date.now();
  // Try proxies starting from a rotating index
  const order = Array.from({length:PROXIES.length},(_,i)=>(lastGoodProxy+1+i)%PROXIES.length);
  for(const i of order){
    pip(i,'trying'); lbl(i);
    // Each proxy gets a unique timestamp so it can't match any previous cache entry
    const proxyUrl = PROXIES[i](targetUrl) + '&_=' + ts + i;
    try{
      const r=await fetchWithTimeout(proxyUrl, 12000);
      if(!r.ok) throw new Error(`HTTP ${r.status}`);
      const t=await r.text();
      if(!t||t.trim().startsWith('<!')) throw new Error('got HTML');
      pip(i,'ok');
      lastGoodProxy = i; // remember which proxy worked
      return t;
    }catch(e){ pip(i,'fail'); console.warn(PROXY_NAMES[i]+' failed:',e.message); }
  }
  throw new Error('All proxies blocked');
}
function pip(i,cls){ const e=document.getElementById('pip'+i); if(e) e.className='pip '+cls; }
function updateLoadingMsg(msg){ const e=document.querySelector('.loading-msg'); if(e) e.textContent=msg; }
function lbl(i){ const e=document.querySelector('.proxy-label em'); if(e) e.textContent=PROXY_NAMES[i]; }

function switchTab(t,el){
  tab=t; allData=[];
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  ['statsRow','ts','rowCount'].forEach(id=>{ document.getElementById(id).innerHTML=''; });
  document.getElementById('filterRow').style.display='none';
  setStatus('','READY');
  showUploadUI();
}

async function fetchData(){
  const btn=document.getElementById('fetchBtn');
  btn.disabled=true; btn.textContent='⟳ Fetching…'; setStatus('loading','FETCHING');
  showLoading();
  try{
    if(tab==='rtbm') await fetchRTBM();
    else if(tab==='da') await fetchDA();
    else await fetchHub();
  }catch(e){
    setStatus('error','ERROR');
    if(allData.length){
      // Keep existing table visible, just show a warning banner above it
      const warn = document.createElement('div');
      warn.style.cssText='background:rgba(255,112,67,.1);border:1px solid rgba(255,112,67,.3);border-radius:6px;padding:10px 14px;margin-bottom:12px;font-size:.78rem;color:#ff7043;font-family:"IBM Plex Mono",monospace';
      warn.innerHTML='⚠ '+e.message+' — showing last loaded data from '+( lastSeenInterval||'previous fetch');
      const content=document.getElementById('content');
      content.insertBefore(warn, content.firstChild);
    } else {
      showUploadUI(e.message);
    }
  }
  btn.disabled=false; btn.textContent='⟳ Fetch Latest';
}

// Track last seen interval so we can detect stale proxy cache
let lastSeenInterval = null;

async function fetchRTBM(){
  // SPP only has one file at the root: RTBM-LMP-SL-latestInterval.csv
  // It is updated in-place every 5 minutes.
  // Problem: proxies cache this file aggressively.
  // Solution: try each proxy in rotation; if the returned interval
  //           matches what we already have, that proxy is stale — try the next one.
  const url = `${BASE}/rtbm-lmp-by-location?path=/RTBM-LMP-SL-latestInterval.csv`;

  // Try every proxy, starting after the last good one
  const order = Array.from({length:PROXIES.length},(_,i)=>(lastGoodProxy+1+i)%PROXIES.length);

  for(const i of order){
    pip(i,'trying'); lbl(i);
    updateLoadingMsg(`Trying ${PROXY_NAMES[i]}…`);
    const proxyUrl = PROXIES[i](url) + '&_=' + Date.now() + i;
    try{
      const r = await fetchWithTimeout(proxyUrl, 12000);
      if(!r.ok) throw new Error(`HTTP ${r.status}`);
      const csv = await r.text();
      if(!csv || csv.trim().startsWith('<!')) throw new Error('got HTML');

      // Extract interval from first data row to detect stale cache
      const firstDataRow = csv.split(/\r?\n/)[1] || '';
      const interval = firstDataRow.split(',')[0]?.trim();
      console.log(`${PROXY_NAMES[i]} returned interval: ${interval}`);

      if(interval && interval === lastSeenInterval){
        // This proxy returned cached data — mark yellow and try next
        pip(i,'fail');
        console.warn(`${PROXY_NAMES[i]} is stale (interval unchanged: ${interval})`);
        updateLoadingMsg(`${PROXY_NAMES[i]} cached — trying next…`);
        continue;
      }

      // Fresh data!
      pip(i,'ok');
      lastGoodProxy = i;
      lastSeenInterval = interval;
      parseAndRender(csv, 'RTBM Real-Time (5-min)');
      return;

    }catch(e){ pip(i,'fail'); console.warn(PROXY_NAMES[i]+' failed:',e.message); }
  }

  // All proxies either failed or returned stale data
  // Show the data anyway with a staleness warning
  updateLoadingMsg('All proxies returned cached data');
  throw new Error('All proxies returned stale or blocked data — try again in a few minutes');
}
async function fetchDA(){
  const n=new Date(),y=n.getFullYear(),m=String(n.getMonth()+1).padStart(2,'0'),d=String(n.getDate()).padStart(2,'0');
  parseAndRender(await proxyFetch(`${BASE}/da-lmp-by-location?path=/${y}/${m}/DA-LMP-SL-${y}${m}${d}0100.csv`),'Day-Ahead Market');
}
async function fetchHub(){
  const t=await proxyFetch('https://marketplace.spp.org/chart-api/hub-and-interface-prices/asChart');
  let data; try{data=JSON.parse(t);}catch(e){throw new Error('Hub response not JSON');}
  renderHub(data); setStatus('live','LIVE');
}

function parseCSV(txt){
  const lines=txt.trim().split(/\r?\n/);
  if(lines.length<2) return [];
  const hdrs=lines[0].split(',').map(h=>h.trim().replace(/"/g,'').toLowerCase());
  return lines.slice(1).map(l=>{
    const v=l.split(',').map(x=>x.trim().replace(/"/g,''));
    const o={}; hdrs.forEach((h,i)=>o[h]=v[i]??''); return o;
  }).filter(r=>Object.values(r).some(v=>v));
}

function parseAndRender(csv,label){
  const rows=parseCSV(csv);
  if(!rows.length) throw new Error('No rows in CSV');
  const g=(r,...ks)=>{ for(const k of ks){ if(r[k]!==undefined&&r[k]!=='') return r[k]; } return ''; };
  allData=rows.map(r=>({
    sl:      g(r,'settlement location','settlementlocation','settlement_location','sl').trim(),
    pnode:   g(r,'pnode','pricing node','pricingnode').trim(),
    lmp:   +(g(r,'lmp','lmp '))||0,
    mec:   +(g(r,'mec'))||0,
    mcc:   +(g(r,'mcc'))||0,
    mlc:   +(g(r,'mlc'))||0,
    // Use CT interval for display, fall back to GMT
    interval: g(r,'interval','gmtintervalend','gmtinterval','intervalend').trim()
  })).filter(r=>r.sl||r.pnode);

  if(!allData.length) throw new Error('Could not map columns. Found: '+Object.keys(rows[0]).join(', '));

  const lmps=allData.map(r=>r.lmp);
  const avg=lmps.reduce((a,b)=>a+b,0)/lmps.length;
  const max=Math.max(...lmps), min=Math.min(...lmps), neg=lmps.filter(v=>v<0).length;

  const ivRaw = allData[0]?.interval||'—';
  // If interval looks like a CT timestamp (no Z/UTC marker), label it CT
  const ivLabel = ivRaw.includes('T') || ivRaw.includes('UTC') ? ivRaw+' GMT' : ivRaw+' CT';
  document.getElementById('ts').innerHTML=
    `<span class="badge">${label}</span>&nbsp;&nbsp;Interval: ${ivLabel}&nbsp;&nbsp;|&nbsp;&nbsp;${allData.length} nodes&nbsp;&nbsp;|&nbsp;&nbsp;Fetched: ${new Date().toLocaleTimeString()}`;

  document.getElementById('statsRow').innerHTML=`
    <div class="stat-card"><div class="stat-label">Avg LMP</div><div class="stat-value">$${avg.toFixed(2)}</div><div class="stat-sub">System average</div></div>
    <div class="stat-card ${max>100?'warn':''}"><div class="stat-label">Max LMP</div><div class="stat-value" style="color:${max>100?'var(--negative)':'var(--orange)'}">$${max.toFixed(2)}</div><div class="stat-sub">Highest node</div></div>
    <div class="stat-card ${min<0?'warn':'good'}"><div class="stat-label">Min LMP</div><div class="stat-value" style="color:${min<0?'var(--accent)':'var(--green)'}">$${min.toFixed(2)}</div><div class="stat-sub">Lowest node</div></div>
    <div class="stat-card ${neg>0?'warn':'good'}"><div class="stat-label">Neg Nodes</div><div class="stat-value" style="color:${neg>0?'var(--orange)':'var(--green)'}">${neg}</div><div class="stat-sub">Below $0/MWh</div></div>
    <div class="stat-card"><div class="stat-label">Total Nodes</div><div class="stat-value">${allData.length}</div><div class="stat-sub">Settlement locs</div></div>`;

  document.getElementById('filterRow').style.display='flex';
  setStatus('live','LIVE'); renderTable();
}

function renderTable(){
  if(!allData.length) return;
  const q=document.getElementById('search').value.toLowerCase();
  const s=document.getElementById('sortSel').value;
  const f=document.getElementById('filt').value;
  let rows=allData.filter(r=>{
    const t=!q||r.sl.toLowerCase().includes(q)||r.pnode.toLowerCase().includes(q);
    const p=f==='all'?true:f==='high'?r.lmp>50:f==='neg'?r.lmp<0:f==='low'?r.lmp<20:true;
    return t&&p;
  });
  rows.sort((a,b)=>s==='lmp_d'?b.lmp-a.lmp:s==='lmp_a'?a.lmp-b.lmp:s==='name'?a.sl.localeCompare(b.sl):s==='mec'?b.mec-a.mec:b.mcc-a.mcc);
  document.getElementById('rowCount').textContent=`${rows.length.toLocaleString()} / ${allData.length.toLocaleString()} nodes`;
  const cc=v=>v<0?'lp c-neg':v>100?'lp c-high':v>0?'lp c-pos':'lp c-zero';
  document.getElementById('content').innerHTML=`
    <div class="table-wrap"><table>
      <thead><tr>
        <th onclick="setSort('name')">Settlement Location</th>
        <th>Pnode</th>
        <th onclick="setSort('lmp_d')">LMP ($/MWh)</th>
        <th onclick="setSort('mec')">MEC</th>
        <th onclick="setSort('mcc')">MCC</th>
        <th>MLC</th>
      </tr></thead>
      <tbody>${rows.map(r=>`<tr>
        <td class="sl-cell">${r.sl||'—'}</td>
        <td class="pnode-cell">${r.pnode||'—'}</td>
        <td class="${cc(r.lmp)}">$${r.lmp.toFixed(2)}</td>
        <td class="comp">$${r.mec.toFixed(2)}</td>
        <td class="comp">$${r.mcc.toFixed(2)}</td>
        <td class="comp">$${r.mlc.toFixed(2)}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;
}
function setSort(v){ document.getElementById('sortSel').value=v; renderTable(); }

function renderHub(data){
  const resp=data.response||data, labels=resp.labels||[], ds=resp.datasets||[];
  document.getElementById('ts').innerHTML=`<span class="badge">Hub &amp; Interface</span>&nbsp;&nbsp;${labels.length} intervals&nbsp;&nbsp;|&nbsp;&nbsp;Fetched: ${new Date().toLocaleTimeString()}`;
  document.getElementById('filterRow').style.display='none';
  let h=`<div class="table-wrap"><table><thead><tr><th>Interval</th>${ds.map(d=>`<th>${d.label}</th>`).join('')}</tr></thead><tbody>`;
  labels.forEach((l,i)=>{
    h+=`<tr><td><span class="badge">${l}</span></td>`;
    ds.forEach(d=>{ const v=parseFloat(d.data?.[i]); h+=`<td class="${isNaN(v)?'comp':v<0?'lp c-neg':v>100?'lp c-high':'lp c-pos'}">${isNaN(v)?'—':'$'+v.toFixed(2)}</td>`; });
    h+=`</tr>`;
  });
  h+=`</tbody></table></div>`;
  document.getElementById('content').innerHTML=h;
}

function showLoading(){
  ['statsRow','ts','rowCount'].forEach(id=>document.getElementById(id).innerHTML='');
  document.getElementById('filterRow').style.display='none';
  document.getElementById('content').innerHTML=`
    <div class="loading-state">
      <div class="spinner"></div>
      <div>Connecting to SPP…</div>
      <div class="loading-msg" style="font-size:.72rem;color:var(--accent);font-family:'IBM Plex Mono',monospace;max-width:320px;text-align:center;word-break:break-all"></div>
      <div class="proxy-label">Trying: <em>${PROXY_NAMES[0]}</em></div>
      <div class="pip-row">${PROXIES.map((_,i)=>`<div class="pip" id="pip${i}"></div>`).join('')}</div>
    </div>`;
}

function showUploadUI(errMsg){
  ['statsRow','ts','rowCount'].forEach(id=>document.getElementById(id).innerHTML='');
  document.getElementById('filterRow').style.display='none';
  const csvUrl='https://portal.spp.org/file-browser-api/download/rtbm-lmp-by-location?path=/RTBM-LMP-SL-latestInterval.csv';
  document.getElementById('content').innerHTML=`
    <div class="upload-zone">
      <h2>📡 Load SPP LMP Data</h2>
      <p style="margin-bottom:18px;color:var(--muted);font-size:.88rem">${errMsg?'The proxies were blocked by SPP\'s server. ':''}Download the CSV from SPP\'s public portal, then load it here.</p>
      <div class="step"><span class="step-num">1</span><span>Open this URL in your browser to download the latest file:<br><code>${csvUrl}</code></span></div>
      <div class="step"><span class="step-num">2</span><span>Come back here and tap <strong>Browse File</strong> (or drag & drop) to load it instantly.</span></div>
      <div class="dropbox"
        ondragover="event.preventDefault();this.style.borderColor='var(--accent)'"
        ondragleave="this.style.borderColor='var(--border)'"
        ondrop="handleDrop(event)">
        <div class="drop-icon">📂</div>
        <div class="drop-text"><strong>Drag & drop</strong> your CSV here<br><span style="font-size:.8rem">or tap the button below</span></div>
        <button class="btn primary" style="font-size:.88rem;padding:11px 24px" onclick="document.getElementById('fp').click()">📁 &nbsp;Browse File…</button>
        <input type="file" id="fp" accept=".csv" style="display:none" onchange="handleFilePick(event)">
      </div>
    </div>`;
}

function loadFile(file){
  if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{ try{ parseAndRender(ev.target.result,'Loaded: '+file.name); }catch(e){ alert('Parse error: '+e.message); }};
  reader.readAsText(file);
}
function handleDrop(e){ e.preventDefault(); loadFile(e.dataTransfer.files[0]); }
function handleFilePick(e){ loadFile(e.target.files[0]); e.target.value=''; }

function setStatus(state,text){ document.getElementById('dot').className='dot '+state; document.getElementById('stxt').textContent=text; }

function toggleAuto(){
  autoOn=!autoOn;
  const btn=document.getElementById('autoBtn');
  if(autoOn){ btn.textContent='Auto-Refresh: On (5m)'; btn.className='btn auto-on'; autoTimer=setInterval(fetchData,5*60*1000); fetchData(); }
  else{ btn.textContent='Auto-Refresh: Off'; btn.className='btn'; clearInterval(autoTimer); }
}

function downloadCSV(){
  if(!allData.length){ alert('Load data first.'); return; }
  const h='Settlement Location,Pnode,LMP,MEC,MCC,MLC,Interval';
  const rows=allData.map(r=>[r.sl,r.pnode,r.lmp,r.mec,r.mcc,r.mlc,r.interval].join(','));
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([[h,...rows].join('\n')],{type:'text/csv'}));
  a.download=`SPP_LMP_${new Date().toISOString().slice(0,16).replace(':','-')}.csv`;
  a.click();
}

// On load: show upload UI immediately instead of triggering failed proxies
showUploadUI();
</script>
</body>
</html>
